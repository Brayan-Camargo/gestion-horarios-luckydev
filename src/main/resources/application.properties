spring.application.name=luckydev

# 1. Conexión a la base de datos
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_horarios_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=54251346
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Configuración de Hibernate (El traductor Java <-> SQL)
# 'update' creará las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 3. Puerto de la aplicación (opcional, por defecto es 8080)
server.port=8080